<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<title>Login</title>

</head>

<body class="login-body">

<div class="login-box">

<div class="logo">Sistema Escolar</div>

<h2>Iniciar sesión</h2>

<input id="usuario" class="form-control" placeholder="Usuario">

<input id="password" type="password" class="form-control" placeholder="Contraseña">

<button id="loginBtn" class="btn">Entrar</button>

</div>

<div id="alertModal" class="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-header">
      <span>Mensaje</span>
      <button id="alertClose" class="confirm-close">✕</button>
    </div>
    <div class="confirm-body">
      <span id="alertText"></span>
    </div>
    <div class="confirm-buttons">
      <button id="alertOk">Aceptar</button>
    </div>
  </div>
</div>

<script type="module" src="login.js"></script>

</body>
</html>
